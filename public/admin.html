<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTP Sync Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-bg {
      0%, 100% { background-color: rgb(234 179 8); }
      50% { background-color: rgb(202 138 4); }
    }
    .syncing-btn {
      animation: pulse-bg 1.5s ease-in-out infinite;
    }
    @keyframes progress-stripe {
      0% { background-position: 1rem 0; }
      100% { background-position: 0 0; }
    }
    .progress-bar-animated {
      background-image: linear-gradient(
        45deg,
        rgba(255,255,255,.15) 25%,
        transparent 25%,
        transparent 50%,
        rgba(255,255,255,.15) 50%,
        rgba(255,255,255,.15) 75%,
        transparent 75%,
        transparent
      );
      background-size: 1rem 1rem;
      animation: progress-stripe 1s linear infinite;
    }
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100">
  <div class="container mx-auto p-6 max-w-6xl">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-white">FTP Sync Monitor</h1>
        <p class="text-slate-400 mt-1">File synchronization dashboard</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <span class="text-slate-400">Status:</span>
          <span id="sync-status" class="px-3 py-1 rounded-full text-sm font-medium bg-slate-700">
            Loading...
          </span>
        </div>
        <button
          id="start-sync"
          class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-all duration-200 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <svg id="sync-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          <span id="sync-btn-text">Start Sync</span>
        </button>
      </div>
    </div>

    <!-- Sync Timing Info -->
    <div class="mb-8 flex gap-6">
      <div class="bg-slate-800 rounded-xl px-5 py-4 border border-slate-700 flex-1">
        <p class="text-slate-400 text-sm mb-1">Last Sync</p>
        <p id="last-sync" class="text-white text-lg font-medium">-</p>
      </div>
      <div class="bg-slate-800 rounded-xl px-5 py-4 border border-slate-700 flex-1">
        <p class="text-slate-400 text-sm mb-1">Next Sync</p>
        <p id="next-sync" class="text-white text-lg font-medium">-</p>
      </div>
    </div>

    <!-- Downloads Section (Active + Pending) -->
    <div id="downloads-section" class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div id="downloads-indicator" class="w-2 h-2 rounded-full bg-slate-500"></div>
        <h2 class="text-xl font-semibold text-white">Downloads</h2>
        <span id="downloads-count" class="px-2 py-0.5 bg-slate-700 rounded-full text-sm text-slate-300">0</span>
      </div>
      <div class="bg-slate-800 rounded-xl shadow-lg overflow-hidden border border-slate-700">
        <table class="min-w-full">
          <thead>
            <tr class="bg-slate-700/50">
              <th class="py-3 px-4 text-left text-sm font-semibold text-slate-300">File</th>
              <th class="py-3 px-4 text-left text-sm font-semibold text-slate-300 w-48">Status</th>
              <th class="py-3 px-4 text-right text-sm font-semibold text-slate-300 w-32">Size</th>
              <th class="py-3 px-4 text-right text-sm font-semibold text-slate-300 w-28">Speed</th>
            </tr>
          </thead>
          <tbody id="downloads-table-body" class="divide-y divide-slate-700">
            <tr id="no-downloads-row">
              <td colspan="4" class="py-8 text-center text-slate-500">No pending downloads</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Recently Finished Section -->
    <div id="finished-section">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-2 h-2 rounded-full bg-blue-500"></div>
        <h2 class="text-xl font-semibold text-white">Recently Finished</h2>
        <span id="finished-count" class="px-2 py-0.5 bg-slate-700 rounded-full text-sm text-slate-300">0</span>
      </div>
      <div class="bg-slate-800 rounded-xl shadow-lg overflow-hidden border border-slate-700">
        <table class="min-w-full">
          <thead>
            <tr class="bg-slate-700/50">
              <th class="py-3 px-4 text-left text-sm font-semibold text-slate-300">File</th>
              <th class="py-3 px-4 text-left text-sm font-semibold text-slate-300 w-32">Status</th>
              <th class="py-3 px-4 text-right text-sm font-semibold text-slate-300 w-32">Size</th>
              <th class="py-3 px-4 text-right text-sm font-semibold text-slate-300 w-28">Speed</th>
              <th class="py-3 px-4 text-right text-sm font-semibold text-slate-300 w-36">Finished</th>
            </tr>
          </thead>
          <tbody id="finished-table-body" class="divide-y divide-slate-700">
            <tr id="no-finished-row">
              <td colspan="5" class="py-8 text-center text-slate-500">No recently finished downloads</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let isSyncing = false;
    let nextSyncTime = null;

    function formatDateTime(timestamp) {
      if (!timestamp) return '-';
      const date = new Date(timestamp * 1000);
      const now = new Date();
      const isToday = date.toDateString() === now.toDateString();
      const time = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (isToday) {
        return `Today at ${time}`;
      }
      return date.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ` at ${time}`;
    }

    function formatCountdown(seconds) {
      if (seconds <= 0) return 'Now';
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins > 0) {
        return `${mins}m ${secs}s`;
      }
      return `${secs}s`;
    }

    function updateCountdown() {
      const nextSyncEl = document.getElementById('next-sync');
      if (!nextSyncTime || isSyncing) {
        if (isSyncing) {
          nextSyncEl.textContent = 'In progress...';
        }
        return;
      }
      const now = Math.floor(Date.now() / 1000);
      const remaining = nextSyncTime - now;
      if (remaining <= 0) {
        nextSyncEl.textContent = 'Starting...';
      } else {
        nextSyncEl.textContent = formatCountdown(remaining);
      }
    }

    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '-';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let i = 0;
      let size = bytes;
      while (size >= 1024 && i < units.length - 1) {
        size /= 1024;
        i++;
      }
      return `${size.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
    }

    function formatTimeAgo(timestamp) {
      if (!timestamp) return '-';
      const now = Math.floor(Date.now() / 1000);
      const diff = now - timestamp;
      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function formatSpeed(speedStr) {
      if (!speedStr) return '-';
      // Parse the KB/s value from backend (e.g., "1234.56 KB/s")
      const match = speedStr.match(/([\d.]+)\s*KB\/s/i);
      if (!match) return speedStr; // Return as-is if not in expected format

      let kbps = parseFloat(match[1]);
      if (isNaN(kbps)) return speedStr;

      if (kbps >= 1024) {
        return `${(kbps / 1024).toFixed(1)} MB/s`;
      }
      return `${kbps.toFixed(0)} KB/s`;
    }

    function updateSyncStatus() {
      fetch('sync-status')
        .then(response => response.json())
        .then(data => {
          const statusEl = document.getElementById('sync-status');
          const btn = document.getElementById('start-sync');
          const btnText = document.getElementById('sync-btn-text');
          const syncIcon = document.getElementById('sync-icon');
          const lastSyncEl = document.getElementById('last-sync');
          const nextSyncEl = document.getElementById('next-sync');

          isSyncing = data.status === 'running';
          nextSyncTime = data.nextSyncTime;

          // Update last sync time
          if (data.lastSyncTime) {
            lastSyncEl.textContent = formatDateTime(data.lastSyncTime);
          } else {
            lastSyncEl.textContent = 'Never';
          }

          // Update next sync countdown
          if (isSyncing) {
            nextSyncEl.textContent = 'In progress...';
          } else if (data.nextSyncTime) {
            updateCountdown();
          } else {
            nextSyncEl.textContent = '-';
          }

          if (isSyncing) {
            statusEl.textContent = 'Syncing';
            statusEl.className = 'px-3 py-1 rounded-full text-sm font-medium bg-green-600 text-white';
            btn.classList.add('syncing-btn');
            btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            btnText.textContent = 'Syncing...';
            syncIcon.classList.add('animate-spin');
          } else {
            statusEl.textContent = 'Idle';
            statusEl.className = 'px-3 py-1 rounded-full text-sm font-medium bg-slate-600 text-slate-200';
            btn.classList.remove('syncing-btn');
            btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            btnText.textContent = 'Start Sync';
            syncIcon.classList.remove('animate-spin');
          }
        })
        .catch(error => {
          console.error('Error fetching sync status:', error);
          document.getElementById('sync-status').textContent = 'Error';
        });
    }

    function createDownloadingRow(path, info) {
      const progress = parseFloat(info.progress) || 0;
      return `
        <tr class="hover:bg-slate-700/50 transition-colors">
          <td class="py-3 px-4">
            <p class="text-xs text-slate-500 truncate">${info.directory || ''}</p>
            <p class="text-slate-200 truncate max-w-md" title="${path}">${path.split('/').pop()}</p>
          </td>
          <td class="py-3 px-4">
            <div class="flex items-center gap-2">
              <div class="flex-1 h-2 bg-slate-700 rounded-full overflow-hidden">
                <div class="h-full bg-green-500 progress-bar-animated rounded-full transition-all duration-300" style="width: ${progress}%"></div>
              </div>
              <span class="text-sm text-slate-400 w-12 text-right">${progress.toFixed(0)}%</span>
            </div>
          </td>
          <td class="py-3 px-4 text-right text-slate-300">${formatBytes(info.size)}</td>
          <td class="py-3 px-4 text-right text-green-400 font-medium">${info.speed || '-'}</td>
        </tr>
      `;
    }

    function createPendingRow(path, info) {
      return `
        <tr class="hover:bg-slate-700/50 transition-colors">
          <td class="py-3 px-4">
            <p class="text-xs text-slate-500 truncate">${info.directory || ''}</p>
            <p class="text-slate-200 truncate max-w-md" title="${path}">${path.split('/').pop()}</p>
          </td>
          <td class="py-3 px-4">
            <span class="px-2 py-1 bg-yellow-500/20 text-yellow-400 rounded text-sm">Pending</span>
          </td>
          <td class="py-3 px-4 text-right text-slate-300">${formatBytes(info.size)}</td>
          <td class="py-3 px-4 text-right text-slate-400">-</td>
        </tr>
      `;
    }

    function createFinishedRow(path, info) {
      const localMissing = info.localExists === false;
      const remoteMissing = info.remoteExists === false;

      let badges = [];
      if (localMissing) {
        badges.push('<span class="px-2 py-1 bg-red-500/20 text-red-400 rounded text-sm" title="File removed from local storage">Local removed</span>');
      }
      if (remoteMissing) {
        badges.push('<span class="px-2 py-1 bg-orange-500/20 text-orange-400 rounded text-sm" title="File no longer on remote server">Remote removed</span>');
      }
      if (!localMissing && !remoteMissing) {
        badges.push('<span class="px-2 py-1 bg-blue-500/20 text-blue-400 rounded text-sm">Synced</span>');
      }

      return `
        <tr class="hover:bg-slate-700/50 transition-colors ${localMissing || remoteMissing ? 'opacity-75' : ''}">
          <td class="py-3 px-4">
            <p class="text-xs text-slate-500 truncate">${info.directory || ''}</p>
            <p class="text-slate-200 truncate max-w-md ${localMissing ? 'line-through text-slate-400' : ''}" title="${path}">${path.split('/').pop()}</p>
          </td>
          <td class="py-3 px-4">
            <div class="flex flex-wrap gap-1">${badges.join('')}</div>
          </td>
          <td class="py-3 px-4 text-right text-slate-300">${formatBytes(info.size)}</td>
          <td class="py-3 px-4 text-right text-slate-400">${formatSpeed(info.speed)}</td>
          <td class="py-3 px-4 text-right text-slate-500">${formatTimeAgo(info.finishedAt)}</td>
        </tr>
      `;
    }

    function updateFilesList() {
      fetch('files')
        .then(response => response.json())
        .then(data => {
          const entries = Object.entries(data);

          // Separate into categories
          const downloading = entries.filter(([, info]) => info.status === 'Downloading');
          const pending = entries.filter(([, info]) => info.status === 'Pending');
          const finished = entries
            .filter(([, info]) => info.status === 'Synced')
            .sort((a, b) => (b[1].finishedAt || 0) - (a[1].finishedAt || 0));

          // Combined downloads (active + pending)
          const downloads = [...downloading, ...pending];
          const downloadsBody = document.getElementById('downloads-table-body');
          const downloadsIndicator = document.getElementById('downloads-indicator');
          document.getElementById('downloads-count').textContent = downloads.length;

          // Update indicator based on state
          if (downloading.length > 0) {
            downloadsIndicator.className = 'w-2 h-2 rounded-full bg-green-500 animate-pulse';
          } else if (pending.length > 0) {
            downloadsIndicator.className = 'w-2 h-2 rounded-full bg-yellow-500';
          } else {
            downloadsIndicator.className = 'w-2 h-2 rounded-full bg-slate-500';
          }

          if (downloads.length === 0) {
            downloadsBody.innerHTML = '<tr id="no-downloads-row"><td colspan="4" class="py-8 text-center text-slate-500">No pending downloads</td></tr>';
          } else {
            const rows = [
              ...downloading.map(([path, info]) => createDownloadingRow(path, info)),
              ...pending.map(([path, info]) => createPendingRow(path, info))
            ];
            downloadsBody.innerHTML = rows.join('');
          }

          // Update finished downloads
          const finishedBody = document.getElementById('finished-table-body');
          document.getElementById('finished-count').textContent = finished.length;
          if (finished.length === 0) {
            finishedBody.innerHTML = '<tr id="no-finished-row"><td colspan="5" class="py-8 text-center text-slate-500">No recently finished downloads</td></tr>';
          } else {
            finishedBody.innerHTML = finished.map(([path, info]) => createFinishedRow(path, info)).join('');
          }
        })
        .catch(error => console.error('Error fetching files:', error));
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateSyncStatus();
      updateFilesList();
      setInterval(updateSyncStatus, 2000);
      setInterval(updateFilesList, 3000);
      setInterval(updateCountdown, 1000);

      document.getElementById('start-sync').addEventListener('click', () => {
        if (isSyncing) return;

        const btn = document.getElementById('start-sync');
        const btnText = document.getElementById('sync-btn-text');
        const syncIcon = document.getElementById('sync-icon');

        // Immediate visual feedback
        btn.classList.add('syncing-btn');
        btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
        btnText.textContent = 'Starting...';
        syncIcon.classList.add('animate-spin');

        fetch('start-sync', { method: 'POST' })
          .then(response => response.json())
          .then(data => {
            console.log('Sync response:', data);
            updateSyncStatus();
          })
          .catch(error => {
            console.error('Error starting sync:', error);
            // Reset button on error
            btn.classList.remove('syncing-btn');
            btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            btnText.textContent = 'Start Sync';
            syncIcon.classList.remove('animate-spin');
          });
      });
    });
  </script>
</body>
</html>
